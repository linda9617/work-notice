<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工作备忘</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Inter", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f7f8fb;
      color: #1f2937;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      padding: 24px;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 35%),
                  linear-gradient(180deg, #ffffff 0%, #f5f7fb 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      padding: 18px 22px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.16);
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
      width: min(540px, 100%);
    }
    .toolbar .title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .toolbar h1 {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: 0.03em;
      color: #111827;
    }
    .toolbar .subtitle {
      margin: 0;
      color: #6b7280;
      font-size: 0.92rem;
    }
    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button.icon-btn, button.action-btn {
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: rgba(255, 255, 255, 0.96);
      color: #1f2937;
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.92rem;
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.04);
    }
    button.icon-btn:hover, button.action-btn:hover {
      transform: translateY(-1px);
      background: #f8fafc;
      border-color: rgba(148, 163, 184, 0.36);
    }
    .card {
      background: #ffffff;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
      padding: 20px;
      width: min(520px, 100%);
      backdrop-filter: blur(10px);
    }
    .status {
      display: grid;
      gap: 12px;
      margin-bottom: 14px;
    }
    .status-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(249,250,251,0.95));
      border: 1px solid rgba(148, 163, 184, 0.16);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.5);
    }
    .status-row strong { font-size: 1rem; color: #334155; }
    .status-row .value { text-align: right; font-size: 1.2rem; font-weight: 700; color: #0f172a; }
    .status-row .small { color: #64748b; font-size: 0.9rem; }
    .controls {
      display: grid;
      gap: 12px;
      margin-bottom: 10px;
    }
    .controls label {
      display: grid;
      gap: 4px;
      font-size: 0.92rem;
      color: #334155;
    }
    .controls input {
      width: 100%;
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 10px;
      font-size: 0.95rem;
      color: #0f172a;
      background: #f8fafc;
    }
    /* Styled selects: custom arrow, padding and focus ring */
    .controls select, .toolbar select, select {
      padding: 9px 34px 9px 10px;
      border: 1px solid rgba(148,163,184,0.22);
      border-radius: 10px;
      background: #ffffff;
      color: #0f172a;
      font-size: 0.95rem;
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path fill="%236b7280" d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 14px;
      cursor: pointer;
    }
    .controls select:hover, .toolbar select:hover { background: #fbfdff; }
    .controls select:focus, .controls input:focus, .toolbar select:focus { outline: none; box-shadow: 0 0 0 4px rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.6); }
    /* toolbar select should size to content */
    .toolbar select { width: auto; padding: 8px 30px 8px 10px; }
    .controls .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .controls .small-text {
      color: #6c778d;
      font-size: 0.92rem;
      line-height: 1.5;
    }
    .controls button.primary {
      width: 100%;
      padding: 12px 16px;
      border: none;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      color: #ffffff;
      border-radius: 14px;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 12px 24px rgba(59, 130, 246, 0.18);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .controls button.primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(59, 130, 246, 0.24);
    }
    .note {
      color: #5f6776;
      font-size: 0.92rem;
      line-height: 1.6;
      margin-top: 8px;
    }
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      width: min(340px, calc(100% - 36px));
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.97);
      border: 1px solid rgba(148, 163, 184, 0.22);
      display: none;
      gap: 10px;
      z-index: 20;
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.14);
      backdrop-filter: blur(16px);
    }
    .toast.show { display: grid; }
    .toast strong { font-size: 0.98rem; }
    .toast small { color: #4b5563; }
    .toast button {
      justify-self: end;
      border: none;
      padding: 8px 12px;
      background: #eef2ff;
      color: #1d4ed8;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .mini-view {
      display: none;
      gap: 14px;
      width: min(520px, 100%);
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .mini-view.show { display: grid; }
    .mini-box {
      display: grid;
      gap: 10px;
      padding: 16px 18px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
    }
    .mini-box .row { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .mini-box .row strong { font-size: 1rem; }
    .mini-box .hint { color: #5a6470; font-size: 0.9rem; }
    body.hidden-mode .card { display: none; }
    body.hidden-mode .mini-view { display: grid; }
    /* Prevent key UI text wrapping and show ellipsis when space is tight */
    .status-row strong,
    .status-row .small,
    .status-row .value,
    .toolbar .title,
    .small-text,
    #manualList li div,
    .controls label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Accessibility and focused controls */
    :focus-visible {
      outline: 3px solid rgba(59,130,246,0.18);
      outline-offset: 2px;
      border-radius: 8px;
    }

    /* Manual list base styles */
    #manualList { list-style:none; padding:0; margin:8px 0 0 0; display:grid; gap:8px; }
    #manualList li { background:#ffffff; border-radius:10px; padding:8px; display:flex; align-items:center; justify-content:space-between; border:1px solid rgba(0,0,0,0.03); }
    #manualList li div { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* Edit panel subtle animation and responsive placement */
    #manualEditPanel { transition: transform 0.18s ease, opacity 0.18s ease; }
    #manualEditPanel.show { transform: translateY(0); opacity:1; }

    /* Responsive tweaks */
    @media (max-width: 640px) {
      body { padding: 16px; }
      .toolbar { width: 100%; padding: 12px; }
      .card { width: 100%; padding: 14px; border-radius: 14px; }
      .mini-view { grid-template-columns: 1fr; gap: 10px; }
      #manualEditPanel { position: fixed; left: 8px; right: 8px; bottom: 12px; width: auto; max-width: none; }
      .button-group { gap: 8px; }
      button.icon-btn, button.action-btn { padding: 8px 10px; font-size: 0.88rem; border-radius: 10px; }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="title">
      <h1>备忘提醒</h1>
    </div>
    <div class="button-group">
      <button class="icon-btn" id="toggleHide">隐藏模式</button>
      <button class="icon-btn" id="toggleQuiet">静音</button>
      <button class="icon-btn" id="requestNotify">启用提醒</button>
    </div>
  </div>
  <section class="card">
    <div class="status">
      <div class="status-row">
        <div>
          <strong>固定提醒</strong>
          <div class="small">16:30-24:00 每0.5小时</div>
        </div>
        <div class="value" id="currentTime">--:--:--</div>
      </div>
      <div class="status-row">
        <div>
          <strong id="scheduleStatusLabel">当前状态：等待提醒</strong>
          <div class="small" id="scheduleCountLabel">累计提醒 0 次</div>
        </div>
        <div class="value" id="nextReminder">--:--</div>
      </div>
    </div>
    <div class="controls">
      <div class="small-text" id="activityStatus">活动状态：检测中</div>
    </div>
  </section>
  <section class="card">
    <div class="status">
      <div class="status-row">
        <div>
          <strong>喝水提醒</strong>
          <div class="small">间隔提醒模式</div>
        </div>
        <div class="value" id="oldCountdown">00:00</div>
      </div>
      <div class="status-row">
        <div>
          <strong id="oldStatusLabel">当前状态：运行中</strong>
          <div class="small" id="oldCountLabel">累计提醒 0 次</div>
        </div>
        <div class="value" id="oldModeLabel">喝水提醒</div>
      </div>
    </div>
    <div class="controls">
      <label>
        计时间隔（分钟）
        <input id="workMinutes" type="number" min="1" max="120" value="45" />
      </label>
      <button class="primary" id="applyBtn">保存设置并重置</button>
    </div>
  </section>
  <section class="card">
    <div class="status">
      <div class="status-row">
        <div>
          <strong>手动提醒</strong>
          <div class="small" id="manualSummary">各类提醒都可手动添加。</div>
        </div>
        <div class="value" id="manualCount">0</div>
      </div>
    </div>
    <div class="controls">
      <label>
        提醒类型
        <select id="manualType">
          <option value="time">指定时间</option>
          <option value="delay">延迟（分钟）</option>
        </select>
      </label>
      <label id="manualTimeLabel">
        指定时间
        <input id="manualTime" type="time" />
      </label>
      <label id="manualDelayLabel" style="display:none;">
        延迟（分钟）
        <input id="manualDelay" type="number" min="1" placeholder="例如：10" />
      </label>
      <label>
        提醒内容
        <input id="manualText" type="text" placeholder="例如：喝水、站起来活动" />
      </label>
      <button class="primary" id="addManualBtn">添加提醒</button>
    </div>
    <div class="controls">
      <div>
        <div class="small-text">已安排的手动提醒</div>
      </div>
      <ul id="manualList" style="list-style:none;padding:0;margin:8px 0 0 0;display:grid;gap:8px;"></ul>
      <div style="display:flex;gap:8px;align-items:center;margin-top:8px;">
        <button class="icon-btn" id="toggleShowIgnored">显示已忽略提醒</button>
        <div style="flex:1"></div>
        <div class="small-text" id="manualPageInfo"></div>
      </div>
    </div>

    <div id="manualEditPanel" style="display:none;position:fixed;right:20px;bottom:20px;width:320px;padding:16px;background:#fff;border:1px solid rgba(148,163,184,0.12);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.12);z-index:30;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><strong>编辑提醒</strong><button id="manualEditClose" class="icon-btn">关闭</button></div>
      <label>提醒内容<input id="manualEditText" type="text" style="width:100%;padding:8px;margin-top:6px;border-radius:8px;border:1px solid rgba(148,163,184,0.2);" /></label>
      <label style="margin-top:8px;">触发时间<input id="manualEditScheduled" type="datetime-local" style="width:100%;padding:8px;margin-top:6px;border-radius:8px;border:1px solid rgba(148,163,184,0.2);" /></label>
      <label style="margin-top:8px;">重复规则<select id="manualEditRepeat" style="width:100%;padding:8px;margin-top:6px;border-radius:8px;border:1px solid rgba(148,163,184,0.2);"><option value="none">无</option><option value="daily">每天</option></select></label>
      <div style="display:flex;gap:8px;margin-top:12px;"><button class="primary" id="manualEditSave">保存</button><button class="icon-btn" id="manualEditCancel">取消</button></div>
    </div>
  </section>
  <section class="mini-view" id="miniView">
    <div class="mini-box">
      <div class="row">
        <strong>固定提醒</strong>
      </div>
      <div class="row">
        <span>下次</span>
        <strong id="miniNextReminder">--:--</strong>
      </div>
      <div class="row">
        <span id="miniScheduleStatus">等待提醒</span>
        <span id="miniScheduleCount">提醒 0 次</span>
      </div>
    </div>
    <div class="mini-box">
      <div class="row">
        <strong>喝水提醒</strong>
      </div>
      <div class="row">
        <span>剩余</span>
        <strong id="miniCountdown">00:00</strong>
      </div>
      <div class="row">
        <span id="miniStatus">专注中</span>
        <span id="miniWaterCount">喝水 0 次</span>
      </div>
    </div>
  </section>
  <aside class="toast" id="toast">
    <strong id="toastTitle">休息一下吧</strong>
    <small id="toastBody">短暂松弛后能更稳定地回到工作状态。</small>
    <button id="closeToast">已看</button>
  </aside>
  <script>
    const scheduleCountdownEl = document.getElementById('currentTime');
    const scheduleNextEl = document.getElementById('nextReminder');
    const scheduleStatusEl = document.getElementById('scheduleStatusLabel');
    const scheduleCountEl = document.getElementById('scheduleCountLabel');
    const oldCountdownEl = document.getElementById('oldCountdown');
    const oldStatusEl = document.getElementById('oldStatusLabel');
    const oldCountEl = document.getElementById('oldCountLabel');
    const oldModeEl = document.getElementById('oldModeLabel');
    const activityStatusEl = document.getElementById('activityStatus');
    const notificationStatusEl = document.getElementById('notificationStatus');
    const toastEl = document.getElementById('toast');
    const closeToastBtn = document.getElementById('closeToast');
    const toggleHideBtn = document.getElementById('toggleHide');
    const toggleQuietBtn = document.getElementById('toggleQuiet');
    const requestNotifyBtn = document.getElementById('requestNotify');
    const workInput = document.getElementById('workMinutes');
    const applyBtn = document.getElementById('applyBtn');
    const manualTypeEl = document.getElementById('manualType');
    const manualTimeEl = document.getElementById('manualTime');
    const manualDelayEl = document.getElementById('manualDelay');
    const manualTextEl = document.getElementById('manualText');
    const manualCountEl = document.getElementById('manualCount');
    const manualSummaryEl = document.getElementById('manualSummary');
    const addManualBtn = document.getElementById('addManualBtn');
    const manualListEl = document.getElementById('manualList');
    const toggleShowIgnoredBtn = document.getElementById('toggleShowIgnored');
    const manualPageInfoEl = document.getElementById('manualPageInfo');
    const manualEditPanel = document.getElementById('manualEditPanel');
    const manualEditText = document.getElementById('manualEditText');
    const manualEditScheduled = document.getElementById('manualEditScheduled');
    const manualEditRepeat = document.getElementById('manualEditRepeat');
    const manualEditSave = document.getElementById('manualEditSave');
    const manualEditCancel = document.getElementById('manualEditCancel');
    const manualEditClose = document.getElementById('manualEditClose');
    const miniCountdownEl = document.getElementById('miniCountdown');
    const miniStatusEl = document.getElementById('miniStatus');
    const miniWaterCountEl = document.getElementById('miniWaterCount');
    const miniNextReminderEl = document.getElementById('miniNextReminder');
    const miniScheduleStatusEl = document.getElementById('miniScheduleStatus');
    const miniScheduleCountEl = document.getElementById('miniScheduleCount');
    const toastTitle = document.getElementById('toastTitle');
    const toastBody = document.getElementById('toastBody');

    const STORAGE_KEY = 'workTimerSettingsV2';
    const ACTIVE_TIMEOUT = 5 * 60 * 1000;
    const SCHEDULE_START = 16 * 60 + 30;
    const SCHEDULE_END = 24 * 60;
    const SCHEDULE_INTERVAL = 30;

    let lastActivity = Date.now();
    let reminderCount = 0;
    let hiddenMode = false;
    let quietMode = false;
    let lastRemindedSlot = null;
    let lastScheduleRemindTime = null;
    let notificationState = 'default';

    let oldIntervalMinutes = 45;
    let oldRemaining = oldIntervalMinutes * 60;
    let oldActive = true;
    let oldReminderCount = 0;
    let manualReminders = [];
    let manualEditingId = null;
    let showIgnored = false;

    let timerId = null;

    function loadSettings() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) return;
        const config = JSON.parse(stored);
        if (typeof config.hiddenMode === 'boolean') hiddenMode = config.hiddenMode;
        if (typeof config.quietMode === 'boolean') quietMode = config.quietMode;
        if (typeof config.reminderCount === 'number') reminderCount = config.reminderCount;
        if (typeof config.lastRemindedSlot === 'string') lastRemindedSlot = config.lastRemindedSlot;
        if (typeof config.oldIntervalMinutes === 'number') oldIntervalMinutes = config.oldIntervalMinutes;
        if (typeof config.oldRemaining === 'number') oldRemaining = config.oldRemaining;
        if (typeof config.oldActive === 'boolean') oldActive = config.oldActive;
        if (typeof config.oldReminderCount === 'number') oldReminderCount = config.oldReminderCount;
        if (Array.isArray(config.manualReminders)) manualReminders = config.manualReminders.filter(r => r.type !== 'custom').map(r => ({ ...r, disabled: !!r.disabled }));
        if (typeof config.showIgnored === 'boolean') showIgnored = config.showIgnored;
        workInput.value = oldIntervalMinutes;
      } catch (error) {
        console.warn('读取设置失败', error);
      }
    }

    function saveSettings() {
      const config = {
        hiddenMode,
        quietMode,
        reminderCount,
        lastRemindedSlot,
        oldIntervalMinutes,
        oldRemaining,
        oldActive,
        oldReminderCount,
        manualReminders,
        showIgnored,
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
    }

    function requestNotificationPermission() {
      if (!('Notification' in window) || typeof Notification.requestPermission !== 'function') {
        updateNotificationStatus();
        showToast('通知不支持', '当前浏览器或页面环境无法使用桌面通知。');
        return;
      }
      const handlePermission = (permission) => {
        notificationState = permission;
        updateNotificationStatus();
        if (permission === 'granted') {
          try {
            new Notification('喝水提醒已启用', { body: '设置成功，后续会在后台提示你喝水', silent: true });
          } catch (error) {
            console.warn('通知测试失败', error);
            showToast('通知已启用', '提醒已开启，但系统通知创建失败。');
          }
        } else if (permission === 'denied') {
          showToast('通知已拒绝', '请在浏览器设置中允许通知，或使用页面内提醒。');
        }
      };
      const result = Notification.requestPermission(handlePermission);
      if (result && typeof result.then === 'function') {
        result.then(handlePermission).catch((error) => {
          console.warn('通知权限请求失败', error);
          updateNotificationStatus();
          showToast('请求失败', '通知权限请求出错，请刷新页面再试。');
        });
      }
    }

    function getNotificationStatusText() {
      if (!('Notification' in window)) return '不支持通知';
      const perm = Notification.permission || notificationState || 'default';
      if (perm === 'granted') return '通知已开启';
      if (perm === 'denied') return '通知已拒绝';
      return '通知未开启';
    }

    function updateNotificationStatus() {
      if (!notificationStatusEl) return;
      notificationStatusEl.textContent = `通知状态：${getNotificationStatusText()}`;
    }


    function formatTime(sec) {
      const minutes = Math.floor(sec / 60).toString().padStart(2, '0');
      const seconds = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${minutes}:${seconds}`;
    }

    function formatSlot(totalMinutes) {
      const hour = Math.floor(totalMinutes / 60).toString().padStart(2, '0');
      const minute = (totalMinutes % 60).toString().padStart(2, '0');
      return `${hour}:${minute}`;
    }

    function getCurrentMinutes(now) {
      return now.getHours() * 60 + now.getMinutes();
    }

    function getScheduleSlots() {
      const slots = [];
      for (let time = SCHEDULE_START; time < SCHEDULE_END; time += SCHEDULE_INTERVAL) {
        slots.push(time);
      }
      return slots;
    }

    function getNextScheduleSlot(now) {
      const currentMinutes = getCurrentMinutes(now);
      const slots = getScheduleSlots();
      for (const slot of slots) {
        if (currentMinutes < slot) return slot;
      }
      return slots.length ? slots[0] : null;
    }

    function isUserActive() {
      return Date.now() - lastActivity <= ACTIVE_TIMEOUT && !document.hidden;
    }

    function markActivity() {
      lastActivity = Date.now();
      if (activityStatusEl) activityStatusEl.textContent = '活动状态：活跃';
    }

    function updateUI() {
      const now = new Date();
      scheduleCountdownEl.textContent = now.toLocaleTimeString();
      const nextSlot = getNextScheduleSlot(now);
      scheduleNextEl.textContent = nextSlot !== null ? formatSlot(nextSlot) : '--:--';
      const activeText = isUserActive() ? '活动状态：活跃' : '活动状态：空闲，暂不提醒';
      if (activityStatusEl) activityStatusEl.textContent = activeText;
      scheduleStatusEl.textContent = isUserActive() ? '当前状态：等待提醒' : '当前状态：空闲中';
      scheduleCountEl.textContent = `累计提醒 ${reminderCount} 次`;
      oldCountdownEl.textContent = formatTime(oldRemaining);
      oldStatusEl.textContent = oldActive ? '当前状态：运行中' : '当前状态：暂停';
      oldCountEl.textContent = `累计提醒 ${oldReminderCount} 次`;
      oldModeEl.textContent = '喝水提醒';
      miniCountdownEl.textContent = formatTime(oldRemaining);
      miniStatusEl.textContent = oldActive ? '专注中' : '暂停中';
      miniWaterCountEl.textContent = `喝水 ${reminderCount} 次`;
      miniNextReminderEl.textContent = nextSlot !== null ? formatSlot(nextSlot) : '--:--';
      miniScheduleStatusEl.textContent = isUserActive() ? '等待提醒' : '空闲';
      miniScheduleCountEl.textContent = `提醒 ${reminderCount} 次`;
      manualCountEl.textContent = manualReminders.length.toString();
      manualSummaryEl.textContent = manualReminders.length
        ? `最新：${manualReminders[manualReminders.length - 1].text}`
        : '各类提醒都可手动添加。';
      renderManualList();
      if (toggleShowIgnoredBtn) toggleShowIgnoredBtn.textContent = showIgnored ? '隐藏已忽略提醒' : '显示已忽略提醒';
      toggleHideBtn.textContent = hiddenMode ? '退出隐藏' : '隐藏模式';
      toggleQuietBtn.textContent = quietMode ? '取消静音' : '静音';
      updateNotificationStatus();
      saveSettings();
    }

    function showToast(message, description) {
      toastTitle.textContent = message;
      toastBody.textContent = description;
      toastEl.classList.add('show');
      if (quietMode) return;
      if (!('Notification' in window)) return;
      const perm = Notification.permission || notificationState || 'default';
      if (perm !== 'granted') return;
      try {
        new Notification(message, { body: description, silent: true });
      } catch (error) {
        console.warn('系统通知创建失败', error);
      }
    }

    function probeNotificationPermission() {
      if (!('permissions' in navigator)) return;
      try {
        navigator.permissions.query({ name: 'notifications' }).then((status) => {
          notificationState = status.state;
          status.onchange = () => {
            notificationState = status.state;
            updateNotificationStatus();
          };
          updateNotificationStatus();
        });
      } catch (error) {
        console.warn('权限查询失败', error);
      }
    }


    function hideToast() {
      toastEl.classList.remove('show');
    }

    function addManualReminder() {
      const type = manualTypeEl ? manualTypeEl.value : 'time';
      const now = new Date();
      const text = (manualTextEl && manualTextEl.value ? manualTextEl.value.trim() : '') || (type === 'time' ? '指定时间提醒' : '延迟提醒');
      let scheduledAt = now;
      if (type === 'time' && manualTimeEl && manualTimeEl.value) {
        const parts = manualTimeEl.value.split(':').map(Number);
        if (parts.length >= 2) {
          scheduledAt = new Date(now.getFullYear(), now.getMonth(), now.getDate(), parts[0], parts[1], 0, 0);
          if (scheduledAt <= now) scheduledAt.setDate(scheduledAt.getDate() + 1);
        }
      } else if (type === 'delay' && manualDelayEl && manualDelayEl.value) {
        const mins = Math.max(1, Number(manualDelayEl.value) || 0);
        scheduledAt = new Date(now.getTime() + mins * 60 * 1000);
      } else {
        // immediate/fallback — schedule now
        scheduledAt = now;
      }

      const reminder = {
        id: Date.now(),
        type,
        text,
        scheduledAt: scheduledAt.toISOString(),
        createdAt: now.toISOString(),
        triggered: false,
      };
      manualReminders.push(reminder);

      if (manualTextEl) manualTextEl.value = '';
      if (manualTimeEl) manualTimeEl.value = '';
      if (manualDelayEl) manualDelayEl.value = '';

      saveSettings();
      updateUI();
    }

    function updateManualInputs() {
      if (!manualTypeEl) return;
      const type = manualTypeEl.value;
      const timeLabel = document.getElementById('manualTimeLabel');
      const delayLabel = document.getElementById('manualDelayLabel');
      if (timeLabel) timeLabel.style.display = type === 'time' ? '' : 'none';
      if (delayLabel) delayLabel.style.display = type === 'delay' ? '' : 'none';
      if (manualTextEl) {
        manualTextEl.placeholder = type === 'time' ? '例如：在 18:30 提醒' : type === 'delay' ? '例如：10 分钟后提醒' : '例如：喝水、站起来活动';
      }
    }

    function checkManualReminders(now) {
      if (!Array.isArray(manualReminders) || manualReminders.length === 0) return;
      const nowTs = now.getTime();
      let changed = false;
      for (const r of manualReminders) {
        if (r.disabled) continue;
        if (!r.scheduledAt) continue;
        const sched = Date.parse(r.scheduledAt);
        if (isNaN(sched)) continue;
        // 只在 triggered 为 false 且时间已到时触发提醒，触发后立即标记为 triggered
        if (!r.triggered && sched <= nowTs) {
          // handle repeat rules
          if (r.repeat === 'daily') {
            // reschedule next day same time
            const next = new Date(sched);
            next.setDate(next.getDate() + 1);
            r.scheduledAt = next.toISOString();
          }
          r.triggered = true;
          changed = true;
          showToast(r.text || '手动提醒', `手动提醒触发：${r.text || ''}`);
        }
      }
      if (changed) {
        saveSettings();
        updateUI();
      }
    }

    function renderManualList() {
      if (!manualListEl) return;
      // always sort by scheduled time ascending
      let list = manualReminders.slice();
      list.sort((a,b) => Date.parse(a.scheduledAt||0) - Date.parse(b.scheduledAt||0));
      // filter ignored based on toggle
      const active = list.filter(r => !r.disabled);
      const ignored = list.filter(r => r.disabled);
      const pageItems = (showIgnored ? ignored : active);
      manualListEl.innerHTML = pageItems.map((r) => {
        const sched = r.scheduledAt ? new Date(r.scheduledAt) : null;
        const timeText = sched ? sched.toLocaleString() : '--';
        const status = r.triggered ? '已触发' : (r.repeat === 'daily' ? '重复' : '等待');
        const short = `${r.text || '[无内容]'} · ${timeText} · ${status}`;
        return `
          <li style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:rgba(250,250,250,0.9);border-radius:10px;border:1px solid rgba(200,200,200,0.12);">
            <div style="flex:1;margin-right:12px;font-size:0.95rem;color:#263238;">${short}</div>
            <div style="display:flex;gap:8px;">
              ${r.disabled ? `<button class="icon-btn restore-btn" data-id="${r.id}">恢复</button><button class="icon-btn purge-btn" data-id="${r.id}">永久删除</button>` : `<button class="icon-btn edit-btn" data-id="${r.id}">编辑</button><button class="icon-btn disable-btn" data-id="${r.id}">忽略</button><button class="icon-btn delete-btn" data-id="${r.id}">删除</button>`}
            </div>
          </li>`;
      }).join('');
      // show total count
      if (manualPageInfoEl) manualPageInfoEl.textContent = `${(showIgnored ? ignored.length : active.length)} 条`;
    }

    function deleteManualReminder(id) {
      const idx = manualReminders.findIndex((x) => x.id === id);
      if (idx === -1) return;
      const removed = manualReminders.splice(idx, 1)[0];
      saveSettings();
      updateUI();
    }

    function disableManualReminder(id) {
      const r = manualReminders.find((x) => x.id === id);
      if (!r) return;
      r.disabled = true;
      saveSettings();
      updateUI();
      showToast('已标记为不再提醒', r.text || '已忽略该提醒');
    }

    function restoreManualReminder(id) {
      const r = manualReminders.find((x) => x.id === id);
      if (!r) return;
      r.disabled = false;
      saveSettings();
      updateUI();
      showToast('已恢复提醒', r.text || '已恢复该提醒');
    }

    function purgeManualReminder(id) {
      deleteManualReminder(id);
    }

    function editManualReminder(id) {
      const r = manualReminders.find((x) => x.id === id);
      if (!r) return;
      manualEditingId = id;
      if (manualEditText) manualEditText.value = r.text || '';
      if (manualEditRepeat) manualEditRepeat.value = r.repeat || 'none';
      if (manualEditScheduled) {
        if (r.scheduledAt) {
          const d = new Date(r.scheduledAt);
          const pad = (n) => n.toString().padStart(2,'0');
          const local = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
          manualEditScheduled.value = local;
        } else {
          manualEditScheduled.value = '';
        }
      }
      if (manualEditPanel) manualEditPanel.style.display = '';
    }

    function closeEditPanel() {
      manualEditingId = null;
      if (manualEditPanel) manualEditPanel.style.display = 'none';
    }

    function saveEditPanel() {
      if (!manualEditingId) return;
      const r = manualReminders.find((x) => x.id === manualEditingId);
      if (!r) return;
      if (manualEditText) r.text = manualEditText.value.trim() || r.text;
      if (manualEditRepeat) r.repeat = manualEditRepeat.value || 'none';
      if (manualEditScheduled && manualEditScheduled.value) {
        // value is local datetime like YYYY-MM-DDTHH:MM
        const dt = new Date(manualEditScheduled.value);
        if (!isNaN(dt)) r.scheduledAt = dt.toISOString();
      }
      r.triggered = false;
      saveSettings();
      updateUI();
      closeEditPanel();
      showToast('已保存提醒', r.text || '手动提醒已更新');
    }

    function shouldTriggerSchedule(now) {
      const currentMinutes = getCurrentMinutes(now);
      const scheduleSlots = getScheduleSlots();
      return now.getSeconds() === 0 && scheduleSlots.includes(currentMinutes);
    }

    function checkAndTriggerScheduleReminder(now) {
      if (!shouldTriggerSchedule(now)) return;
      if (!isUserActive()) return;
      
      // 用当前时刻分钟级时间戳作为 key，确保整分钟内只触发一次
      const currentMinuteTs = Math.floor(now.getTime() / 60000) * 60000;
      if (lastScheduleRemindTime === currentMinuteTs) return;
      
      lastScheduleRemindTime = currentMinuteTs;
      reminderCount += 1;
      showToast('该喝水了', '现在是固定提醒时间，补充一杯水保持精力。');
    }

    function tickOldTimer() {
      if (!oldActive) return;
      if (oldRemaining > 0) {
        oldRemaining -= 1;
        return;
      }
      oldReminderCount += 1;
      oldRemaining = oldIntervalMinutes * 60;
      showToast('喝水提醒', '时间到了，补充水或休息一下。');
    }

    function toggleHiddenMode() {
      hiddenMode = !hiddenMode;
      document.body.classList.toggle('hidden-mode', hiddenMode);
      updateUI();
    }

    function toggleQuietMode() {
      quietMode = !quietMode;
      updateUI();
    }

    function applyOldTimerSettings() {
      const newInterval = Number(workInput.value);
      oldIntervalMinutes = Number.isFinite(newInterval) && newInterval >= 1 ? Math.round(newInterval) : 45;
      oldRemaining = oldIntervalMinutes * 60;
      oldActive = true;
      oldReminderCount = 0;
      hideToast();
      updateUI();
    }

    closeToastBtn.addEventListener('click', hideToast);
    toggleHideBtn.addEventListener('click', toggleHiddenMode);
    toggleQuietBtn.addEventListener('click', toggleQuietMode);
    requestNotifyBtn.addEventListener('click', requestNotificationPermission);
    if (manualTypeEl) manualTypeEl.addEventListener('change', updateManualInputs);
    addManualBtn.addEventListener('click', addManualReminder);
    if (manualListEl) {
      manualListEl.addEventListener('click', (e) => {
        const btn = e.target.closest('button');
        if (!btn) return;
        const id = Number(btn.getAttribute('data-id')) || null;
        if (!id) return;
        if (btn.classList.contains('delete-btn')) deleteManualReminder(id);
        else if (btn.classList.contains('edit-btn')) editManualReminder(id);
        else if (btn.classList.contains('disable-btn')) disableManualReminder(id);
        else if (btn.classList.contains('restore-btn')) restoreManualReminder(id);
        else if (btn.classList.contains('purge-btn')) purgeManualReminder(id);
      });
    }
    if (toggleShowIgnoredBtn) toggleShowIgnoredBtn.addEventListener('click', () => { showIgnored = !showIgnored; toggleShowIgnoredBtn.textContent = showIgnored ? '隐藏已忽略提醒' : '显示已忽略提醒'; saveSettings(); updateUI(); });
    if (manualEditCancel) manualEditCancel.addEventListener('click', closeEditPanel);
    if (manualEditClose) manualEditClose.addEventListener('click', closeEditPanel);
    if (manualEditSave) manualEditSave.addEventListener('click', saveEditPanel);
    applyBtn.addEventListener('click', applyOldTimerSettings);
    workInput.addEventListener('input', () => {
      applyBtn.disabled = false;
    });

    ['mousemove', 'keydown', 'mousedown', 'touchstart'].forEach((event) => {
      window.addEventListener(event, markActivity, { passive: true });
    });

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) markActivity();
      updateUI();
    });

    document.addEventListener('DOMContentLoaded', () => {
      loadSettings();
      document.body.classList.toggle('hidden-mode', hiddenMode);
      probeNotificationPermission();
      updateUI();
      updateManualInputs();
      setInterval(() => {
        const now = new Date();
        updateUI();
        checkAndTriggerScheduleReminder(now);
        tickOldTimer();
        checkManualReminders(now);
      }, 1000);
    });
  </script>
</body>
</html>
